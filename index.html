<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IELTS Fill-in-the-Blank Builder</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.3.136/pdf.min.mjs" type="module"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  </head>
  <body>
    <header>
      <h1>IELTS Fill-in-the-Blank Exercise Generator</h1>
      <p>Create listening/reading gap-fill exercises from pasted text, PDF, or DOCX.</p>
    </header>

    <main class="layout">
      <section class="left-panel">
        <div class="toolbar">
          <textarea id="sourceInput" placeholder="Paste listening script or reading text here..."></textarea>
          <div class="row">
            <input id="fileInput" type="file" accept=".pdf,.docx" />
            <button id="loadTextBtn">Load Text</button>
            <button id="resetBtn" class="danger">Reset</button>
          </div>
          <div class="row options-row">
            <label><input id="hintToggle" type="checkbox" /> Add first-letter hints</label>
            <button id="autoDifficultBtn">Auto Difficult Vocab</button>
            <button id="autoRandomBtn">Random 5-10 Blanks</button>
          </div>
          <div class="row">
            <label>Mode:</label>
            <button id="teacherModeBtn" class="mode active">Teacher</button>
            <button id="studentModeBtn" class="mode">Student</button>
            <button id="saveExerciseBtn">Save</button>
            <button id="loadExerciseBtn">Load</button>
          </div>
        </div>

        <article id="textCanvas" class="text-canvas" aria-label="Exercise text"></article>
      </section>

      <aside class="right-panel">
        <h2>Answer Panel</h2>
        <ol id="answerList"></ol>

        <div class="copy-export">
          <button id="copyQuestionsBtn">Copy Questions</button>
          <button id="copyAnswersBtn">Copy Answers</button>
          <button id="copyBothBtn">Copy Both</button>
          <button id="exportDocxBtn">Export DOCX</button>
          <button id="exportPdfBtn">Export PDF</button>
        </div>
      </aside>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
